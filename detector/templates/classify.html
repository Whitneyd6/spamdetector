<!DOCTYPE html>
<html>
<head>
    <title>Spam Detector</title>
</head>
<body>
    <h1>Spam Email Detector</h1>

    <form method="POST">
        {% csrf_token %}
        <textarea name="email_text" rows="6" cols="60"
            placeholder="Paste your email here...">{{ email_text }}</textarea>
        <br><br>
        <button type="submit">Check Email</button>
    </form>

    {% if result %}
        <h2>Result:
            {% if result == "spam" %}
                🚨 This is SPAM!
            {% else %}
                ✅ This is NOT Spam
            {% endif %}
        </h2>
    {% endif %}

</body>
</html>
